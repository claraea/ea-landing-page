<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B2D4F"/>
      <stop offset="1" stop-color="#0E1A2E"/>
    </linearGradient>
    <radialGradient id="halo" cx="78%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#B8945E" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1B2D4F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- borda lateral dourada -->
  <rect x="0" y="0" width="6" height="630" fill="#B8945E"/>

  <!-- eyebrow -->
  <text x="80" y="170" font-family="Inter, sans-serif" font-size="20" font-weight="600"
        letter-spacing="6" fill="#B8945E">ARQUITETURA CORPORATIVA</text>

  <!-- wordmark Clara/EA -->
  <text x="80" y="320" font-family="'Source Serif 4', Georgia, serif" font-size="180"
        font-weight="600" letter-spacing="-4">
    <tspan fill="#F5F2EC">Clara</tspan><tspan fill="#B8945E">/</tspan><tspan fill="#F5F2EC">EA</tspan>
  </text>

  <!-- subtítulo -->
  <text x="80" y="385" font-family="'Source Serif 4', Georgia, serif" font-size="34"
        font-style="italic" fill="#E8DCC0">Framework de Arquitetura Corporativa</text>

  <!-- epígrafe -->
  <line x1="80" y1="465" x2="84" y2="555" stroke="#B8945E" stroke-width="2"/>
  <text x="110" y="495" font-family="'Source Serif 4', Georgia, serif" font-size="26"
        font-style="italic" fill="#F5F2EC">"A Arquitetura condiciona o comportamento."</text>
  <text x="110" y="540" font-family="Inter, sans-serif" font-size="16" font-weight="500"
        letter-spacing="1.5" fill="#9A9A9A">MARCELO ANDRADE CLARA  ·  CLARAEA.COM.BR</text>
</svg>
